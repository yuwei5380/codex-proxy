services:
  codex-proxy:
    image: yuwei/codex-proxy:latest
    # To build from source instead: comment out 'image' above, uncomment 'build' below
    # build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-18080}:18080"
      - "1455:1455"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=18080

